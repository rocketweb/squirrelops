# The control plane needs the sibling repos (pingting, clownpeanuts) on a
# shared volume. Point it at your checkout with SQUIRRELOPS_WORKSPACE, e.g.
#   SQUIRRELOPS_WORKSPACE=~/code docker compose -f docker-compose.controlplane.yml up
# or set it in a .env file next to this compose file. It defaults to
# /Users/matt/code for backward compatibility. Inside the container the
# workspace is always mounted at /workspace, so no host path leaks in.
services:
  controlplane-api:
    build:
      context: .
      dockerfile: apps/controlplane-api/Dockerfile
    ports:
      - "8199:8199"
    environment:
      CONTROLPLANE_WORKSPACE_ROOT: /workspace
      CLOWNPEANUTS_API_BASE: http://host.docker.internal:8099
      CLOWNPEANUTS_WS_EVENTS_URL: ws://host.docker.internal:8099/ws/events
      CLOWNPEANUTS_WS_THEATER_URL: ws://host.docker.internal:8099/ws/theater/live
      PINGTING_REPO_PATH: /workspace/pingting
      PINGTING_STATUS_PATH: /workspace/pingting/data/status.json
      PINGTING_CONFIG_PATH: /workspace/pingting/config/pingting.yaml
    volumes:
      - ${SQUIRRELOPS_WORKSPACE:-/Users/matt/code}:/workspace
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  controlplane-dashboard:
    build:
      context: ./apps/controlplane-dashboard
    ports:
      - "4317:4317"
    environment:
      NEXT_PUBLIC_CONTROLPANE_API: http://127.0.0.1:8199
      NEXT_PUBLIC_CONTROLPANE_WS: ws://127.0.0.1:8199
    depends_on:
      - controlplane-api
    restart: unless-stopped
